<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sanad Services Center</title>

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#e9e9e9;
      overflow:hidden;
      position:relative;
    }

    /* Background Pattern */
    .pattern{
      position:absolute;
      bottom:0;
      right:0;
      width:55%;
      opacity:0.95;
      z-index:0;
    }

    /* Main Card */
    .container{
      position:relative;
      z-index:2;
      width:90%;
      max-width:420px;
      text-align:center;
    }

    .logo{
      width:280px;
      margin-bottom:40px;
    }

    .buttons{
      display:flex;
      flex-direction:column;
      gap:20px;
    }

    .btn{
      background:white;
      text-decoration:none;
      color:#111;
      border-radius:20px;
      padding:18px 22px;
      display:flex;
      align-items:center;
      gap:18px;
      font-size:20px;
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
      transition:0.3s ease;
    }

    .btn:hover{
      transform:translateY(-4px) scale(1.02);
    }

    .icon{
      min-width:58px;
      height:58px;
      background:#005b96;
      border-radius:50%;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      font-size:24px;
    }

    .wave{
      position:absolute;
      top:180px;
      left:-50px;
      width:120%;
      height:120px;
      border-top:18px solid #005b96;
      border-radius:50%;
      transform:rotate(-2deg);
      z-index:1;
    }

    @media(max-width:600px){

      .logo{
        width:230px;
      }

      .btn{
        font-size:17px;
        padding:16px;
      }

      .icon{
        width:50px;
        height:50px;
        font-size:20px;
      }
    }

  </style>
</head>
<body>

  <!-- Blue Wave -->
  <div class="wave"></div>

  <!-- Background Pattern -->
  <img src="GlassBranding.png" class="pattern" alt="Pattern">

  <div class="container">

    <!-- Logo -->
    <img src="logo.png" class="logo" alt="Sanad Logo">

    <!-- Buttons -->
    <div class="buttons">

      <!-- Phone -->
      <a href="tel:+96896567871" class="btn">
        <div class="icon">
          <i class="fas fa-phone"></i>
        </div>
        +968 9656 7871
      </a>

      <!-- Location -->
      <a href="https://maps.google.com/?q=Ruwi,Muscat,Oman" class="btn">
        <div class="icon">
          <i class="fas fa-location-dot"></i>
        </div>
        Ruwi, Muscat
      </a>

      <!-- Email -->
      <a href="mailto:abdulrahman.salim@tejarah.gov.com" class="btn">
        <div class="icon">
          <i class="fas fa-envelope"></i>
        </div>
        abdulrahman.salim@tejarah.gov.com
      </a>

      <!-- Website -->
      <a href="https://www.sanad.om/smartformsOnline/PublicSite/Home/Index" class="btn">
        <div class="icon">
          <i class="fas fa-globe"></i>
        </div>
        www.sanad.om
      </a>

    </div>

  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sanad Services Center</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }
    body {
      min-height: 100vh;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }
    .pattern {
      position: fixed;
      bottom: -20px;
      right: -20px;
      width: 55%;
      max-width: 280px;
      z-index: 0;
      opacity: 1;
    }
    .page-wrapper {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    /* Logo area — white background with wave below */
    .logo-section {
      width: 100%;
      background: white;
      display: flex;
      justify-content: center;
      padding: 40px 20px 20px;
      position: relative;
      z-index: 2;
    }
    .logo {
      width: 260px;
    }
    /* Wave SVG */
    .wave-wrapper {
      width: 100%;
      line-height: 0;
      position: relative;
      z-index: 1;
    }
    .wave-wrapper svg {
      display: block;
      width: 100%;
    }
    /* Buttons section */
    .buttons-section {
      width: 100%;
      padding: 30px 24px 60px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      z-index: 2;
    }
    .btn {
      background: white;
      text-decoration: none;
      color: #222;
      border-radius: 50px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 17px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.10);
      transition: 0.3s ease;
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }
    .icon {
      min-width: 52px;
      height: 52px;
      background: #1a4f80;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 22px;
    }
  </style>
</head>
<body>

  <img src="GlassBranding.png" class="pattern" alt="Pattern">

  <div class="page-wrapper">

    <!-- Logo -->
    <div class="logo-section">
      <img src="logo.png" class="logo" alt="Sanad Logo">
    </div>

    <!-- Wave -->
    <div class="wave-wrapper">
      <svg viewBox="0 0 420 60" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <path d="M0,0 Q210,80 420,0 L420,60 L0,60 Z" fill="#f0f0f0"/>
        <path d="M0,0 Q210,80 420,0" fill="none" stroke="#1a4f80" stroke-width="10"/>
      </svg>
    </div>

    <!-- Buttons -->
    <div class="buttons-section">
      <a href="tel:+96896567871" class="btn">
        <div class="icon"><i class="fas fa-phone"></i></div>
        +968 9656 7871
      </a>
      <a href="https://maps.google.com/?q=Ruwi,Muscat,Oman" class="btn">
        <div class="icon"><i class="fas fa-location-dot"></i></div>
        Ruwi, Muscat, Sultanate of Oman
      </a>
      <a href="mailto:abdulrahman.salim@tejarah.gov.com" class="btn">
        <div class="icon"><i class="fas fa-envelope"></i></div>
        abdulrahman.salim@tejarah.gov.com
      </a>
      <a href="https://www.sanad.om" class="btn">
        <div class="icon"><i class="fas fa-globe"></i></div>
        www.sanad.om
      </a>
    </div>

  </div>

</body>
</html>
